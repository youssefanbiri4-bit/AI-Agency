name: CI Hardening

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-and-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Clean install dependencies
        run: npm ci

      - name: Security audit (prod deps only, high severity)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      - name: CI debug info (versions + dry typecheck)
        run: |
          mkdir -p ci-logs
          node --version > ci-logs/env.log 2>&1 || true
          npm --version >> ci-logs/env.log 2>&1 || true
          npx tsc --version >> ci-logs/env.log 2>&1 || true
          npm run typecheck >> ci-logs/env.log 2>&1 || true
        continue-on-error: true

      - name: TypeScript type checking
        run: |
          mkdir -p ci-logs
          set -o pipefail
          npm run typecheck 2>&1 | tee ci-logs/typecheck.log

      - name: Upload typecheck logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-logs
          path: ci-logs/typecheck.log

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm run test
